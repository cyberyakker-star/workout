<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#f6f5f1">
<title>Workout</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23f6f5f1'/%3E%3Crect x='14' y='34' width='14' height='32' rx='5' fill='%23c96442'/%3E%3Crect x='72' y='34' width='14' height='32' rx='5' fill='%234a5539'/%3E%3Crect x='28' y='45' width='44' height='10' rx='4' fill='%2334322b'/%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Workout">
<style>
/* ============================================================
   TRAINING OPS — home gym command board
   ============================================================
   >>> TO EDIT YOUR PLANS: scroll to the PLAN DATA block in the
   <script> near the bottom. Everything you'd want to change —
   exercises, sets, reps, the weekly run table — lives in the
   ATHLETES object. Nothing else needs touching.
   ============================================================ */

/* Neutral shell (roster / default) */
:root{
  --bg:#f6f5f1; --panel:#ffffff; --panel-2:#efede7; --line:#e4e1d8;
  --line-bright:#cec9ba; --ink:#34322b; --ink-dim:#7c7768; --ink-faint:#a5a091;
  --amber:#9c7c3c; --amber-dim:#b09a6a; --lime:#7c9a4a; --run:#4f8ba3;
  --strength:#b07a4a; --rest:#8a8a76; --done:#6f9e4a; --danger:#c05a4a;
  --serif:Georgia,"Times New Roman",serif;
  --mono:"SFMono-Regular",ui-monospace,"Cascadia Mono","Roboto Mono",Menlo,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  background:var(--bg); color:var(--ink); font-family:var(--sans);
  line-height:1.5; min-height:100vh;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}
/* Tactical theme — Anthony's session */
body.theme-tactical{
  --bg:#12140f; --panel:#1b1e16; --panel-2:#232720; --line:#333a2c;
  --line-bright:#4a5539; --ink:#e8ead9; --ink-dim:#9aa383; --ink-faint:#6b7358;
  --amber:#d8b04a; --amber-dim:#8a7530; --lime:#a3c14a; --run:#5aa9c4;
  --strength:#c98a4a; --rest:#7d8a6a; --done:#7fae4a; --danger:#c46a5a;
  background-image:
    linear-gradient(rgba(255,255,255,.012) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.012) 1px,transparent 1px);
  background-size:26px 26px;
}
/* Warm theme — Celina's session (Claude-app cream + terracotta) */
body.theme-celina{
  --bg:#faf5ef; --panel:#fffdf9; --panel-2:#f6ece1; --line:#eddfd1;
  --line-bright:#dcc4ae; --ink:#3d3929; --ink-dim:#8a7f6d; --ink-faint:#b3a692;
  --amber:#c96442; --amber-dim:#da7756; --lime:#8fac6a; --run:#b56a86;
  --strength:#c98a4a; --rest:#a89a83; --done:#8fac6a; --danger:#bf4d32;
}
.wrap{max-width:640px;margin:0 auto;padding:20px 16px 64px}
.mono{font-family:var(--mono)}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

/* ---- header ---- */
.top{display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding-bottom:14px;margin-bottom:20px;border-bottom:1px solid var(--line)}
.topline{display:flex;align-items:baseline;gap:8px;min-width:0;font-family:var(--mono);font-size:12px;
  font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--amber)}
.topline .tl-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.tl-edit{flex:none;font-family:var(--mono);font-size:10px;letter-spacing:.08em;color:var(--ink-dim);
  text-transform:none;font-weight:400;padding:2px 4px}
.tl-edit:hover{color:var(--amber)}
.top .clock{font-family:var(--mono);font-size:11px;color:var(--ink-faint);
  letter-spacing:.1em;text-align:right;text-transform:uppercase;flex:none}

/* ---- eyebrow labels ---- */
.eyebrow{font-family:var(--mono);font-size:10.5px;letter-spacing:.22em;
  text-transform:uppercase;color:var(--ink-faint);margin:0 0 12px}

/* ---- roster (name select) ---- */
.roster{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:460px){.roster{grid-template-columns:1fr}}
.op-card{position:relative;background:var(--panel);border:1px solid var(--line);
  border-radius:4px;padding:20px 18px;text-align:left;overflow:hidden;
  transition:border-color .15s,transform .1s}
.op-card:active{transform:scale(.985)}
.op-card:hover{border-color:var(--line-bright)}
.op-card .tag{font-family:var(--mono);font-size:10px;letter-spacing:.18em;
  color:var(--amber-dim);text-transform:uppercase}
.op-card .name{font-family:var(--mono);font-size:23px;font-weight:600;
  letter-spacing:.04em;margin:6px 0 2px;color:var(--ink)}
.op-card .goal{font-size:13px;color:var(--ink-dim);line-height:1.4}
.op-card .corner{position:absolute;top:0;right:0;width:34px;height:34px;
  border-top:2px solid var(--line-bright);border-right:2px solid var(--line-bright);
  border-top-right-radius:4px;opacity:.5}
.op-card .enter{margin-top:16px;font-family:var(--mono);font-size:11px;
  letter-spacing:.14em;color:var(--ink-faint);display:flex;align-items:center;gap:6px}
.op-card:hover .enter{color:var(--amber)}

/* Anthony's card stays tactical even on the neutral roster */
.op-card.op-tact{background:#1b1e16;border-color:#333a2c}
.op-card.op-tact:hover{border-color:#4a5539}
.op-card.op-tact .tag{color:#8a7530}
.op-card.op-tact .name{color:#e8ead9}
.op-card.op-tact .goal{color:#9aa383}
.op-card.op-tact .enter{color:#6b7358}
.op-card.op-tact:hover .enter{color:#d8b04a}
.op-card.op-tact .corner{border-top-color:#4a5539;border-right-color:#4a5539}

/* Celina's card — warm, soft, Claude-style */
.op-card.op-fem{background:linear-gradient(150deg,#fffaf5,#f8e8dd);
  border-color:#eed8c8;border-radius:18px}
.op-card.op-fem:hover{border-color:#da7756}
.op-card.op-fem .corner{display:none}
.op-card.op-fem .tag{color:#c96442}
.op-card.op-fem .name{font-family:var(--serif);color:#3d3929;letter-spacing:.01em}
.op-card.op-fem .goal{color:#8a7f6d}
.op-card.op-fem .enter{color:#c9b8a4}
.op-card.op-fem:hover .enter{color:#c96442}

/* add-custom card + delete */
.op-card.op-add{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
  background:transparent;border:1.5px dashed var(--line-bright);min-height:96px;color:var(--ink-faint)}
.op-card.op-add:hover{border-color:var(--amber);color:var(--amber)}
.op-add .add-plus{font-size:26px;line-height:1}
.op-add .add-label{font-size:11px;letter-spacing:.16em}
@media(max-width:460px){.op-card.op-add{min-height:64px;flex-direction:row}}
.op-card.op-custom{cursor:pointer}
.op-del{position:absolute;top:8px;right:8px;width:24px;height:24px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:12px;z-index:2;
  background:rgba(0,0,0,.25);color:#fff;opacity:.55}
.op-card.op-fem .op-del{background:rgba(201,100,66,.18);color:#c96442}
.op-del:hover{opacity:1}

/* builder chips */
.brow{margin:10px 0 4px}
.blabel{font-size:10px;letter-spacing:.16em;color:var(--ink-faint);text-transform:uppercase;margin-bottom:7px}
.optgrid{display:flex;flex-wrap:wrap;gap:7px}
.chip{font-family:var(--sans);font-size:13px;padding:9px 13px;border-radius:999px;
  border:1px solid var(--line-bright);color:var(--ink-dim);background:var(--panel)}
.chip.on{border-color:var(--amber);background:var(--amber);color:var(--bg);font-weight:600}
.binput{width:100%;background:var(--panel-2);color:var(--ink);border:1px solid var(--line-bright);
  border-radius:8px;padding:11px 12px;font-family:var(--sans);font-size:15px}
.plan-static{flex:1;min-width:0;font-size:13px;color:var(--ink);letter-spacing:.02em}

/* ---- session header ---- */
.session-top{margin-bottom:18px}
.backbtn{font-family:var(--mono);font-size:11px;letter-spacing:.12em;
  color:var(--ink-dim);text-transform:uppercase;display:inline-flex;
  align-items:center;gap:7px;padding:8px 0;margin-bottom:14px}
.backbtn:hover{color:var(--amber)}
.who{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
.who .n{font-family:var(--mono);font-size:22px;font-weight:600;letter-spacing:.04em}
.who .wstat{font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:var(--ink-faint);text-transform:uppercase}
.who .wstat b{color:var(--ink);font-size:13px;margin:0 2px;font-weight:700}

/* ---- week strip (borderless control band) ---- */
#weekstrip-slot{padding-bottom:12px;border-bottom:1px solid var(--line)}
.weekstrip{display:flex;align-items:center;gap:10px;margin:16px 0 0;padding:0}
.weekstrip label{font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;
  color:var(--ink-faint);text-transform:uppercase;flex:none}
.weekstrip select{flex:1;min-width:0;background:var(--panel-2);color:var(--ink);
  border:1px solid var(--line);border-radius:6px;padding:8px 10px;
  font-family:var(--mono);font-size:13px;letter-spacing:.03em}
.weekstrip .phase{font-family:var(--mono);font-size:10px;letter-spacing:.1em;
  color:var(--amber);text-transform:uppercase;flex:none}

/* ---- day tabs ---- */
.days{display:flex;gap:6px;margin:16px 0;overflow-x:auto;padding-bottom:4px;
  scrollbar-width:none}
.days::-webkit-scrollbar{display:none}
.day-tab{flex:none;font-family:var(--mono);font-size:11px;letter-spacing:.08em;
  padding:8px 12px;border:1px solid transparent;border-radius:8px;
  background:transparent;color:var(--ink-faint);text-transform:uppercase;
  display:flex;flex-direction:column;align-items:center;gap:4px;min-width:50px;
  transition:color .12s,background .12s}
.day-tab .dtype{width:5px;height:5px;border-radius:50%;background:var(--ink-faint)}
.day-tab.run .dtype{background:var(--run)}
.day-tab.strength .dtype{background:var(--strength)}
.day-tab.rest .dtype{background:var(--rest)}
.day-tab.mixed .dtype{background:var(--lime)}
.day-tab.active{color:var(--ink);background:var(--panel-2);border-color:var(--line)}
.day-tab.active .dtype{box-shadow:0 0 7px currentColor}
.day-tab.istoday::after{content:"\2022";font-size:6px;color:var(--amber);
  position:absolute;margin-top:-3px}

/* ---- session card ---- */
.session{background:var(--panel);border:1px solid var(--line);border-radius:5px;
  overflow:hidden}
.session-head{padding:16px 18px;border-bottom:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;gap:12px}
.session-head .st{display:flex;align-items:center;gap:10px}
.session-head .badge{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;
  text-transform:uppercase;padding:4px 9px;border-radius:3px;font-weight:600}
.badge.run{background:rgba(90,169,196,.16);color:var(--run)}
.badge.strength{background:rgba(201,138,74,.16);color:var(--strength)}
.badge.rest{background:rgba(125,138,106,.18);color:var(--rest)}
.badge.mixed{background:rgba(163,193,74,.16);color:var(--lime)}
.session-head h2{font-family:var(--mono);font-size:15px;font-weight:600;
  letter-spacing:.03em;margin:0;color:var(--ink)}
.session-head .dur{font-family:var(--mono);font-size:11px;color:var(--ink-faint);
  letter-spacing:.06em;flex:none}

/* progress bar */
.prog{height:3px;background:var(--panel-2)}
.prog .fill{height:100%;background:var(--done);width:0;transition:width .25s}

/* ---- run brief ---- */
.runbrief{padding:18px}
.runbrief .headline{font-family:var(--mono);font-size:17px;color:var(--run);
  letter-spacing:.02em;margin:0 0 14px}
.runrows{display:flex;flex-direction:column;gap:1px;background:var(--line);
  border:1px solid var(--line);border-radius:4px;overflow:hidden}
.runrow{display:flex;justify-content:space-between;gap:12px;padding:11px 14px;
  background:var(--panel);font-size:13.5px}
.runrow .k{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;
  color:var(--ink-faint);text-transform:uppercase}
.runrow .v{color:var(--ink);text-align:right}

/* ---- rest brief ---- */
.restbrief{padding:22px 18px}
.restbrief .big{font-family:var(--mono);font-size:16px;color:var(--rest);
  letter-spacing:.05em;margin:0 0 10px}
.restbrief ul{margin:0;padding-left:18px;color:var(--ink-dim);font-size:13.5px}
.restbrief li{margin:4px 0}

/* ---- exercise rows ---- */
.exlist{display:flex;flex-direction:column}
.ex{border-bottom:1px solid var(--line);padding:14px 18px;transition:background .12s}
.ex:last-child{border-bottom:none}
.ex.done{background:rgba(127,174,74,.06)}
.ex-head{display:flex;align-items:flex-start;gap:13px}
.check{flex:none;width:26px;height:26px;border:1.5px solid var(--line-bright);
  border-radius:5px;margin-top:1px;display:flex;align-items:center;justify-content:center;
  transition:all .14s;background:var(--panel-2)}
.check svg{width:14px;height:14px;opacity:0;transform:scale(.6);transition:all .14s}
.ex.done .check{background:var(--done);border-color:var(--done)}
.ex.done .check svg{opacity:1;transform:scale(1)}
.ex-body{flex:1;min-width:0}
.ex-name{font-size:15.5px;font-weight:600;color:var(--ink);letter-spacing:.01em;
  display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ex.done .ex-name{color:var(--ink-dim)}
.ex-scheme{font-family:var(--mono);font-size:12px;color:var(--amber);
  letter-spacing:.05em;margin-top:3px}
.ex-note{font-size:12.5px;color:var(--ink-faint);margin-top:3px;line-height:1.4}
.ex-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.demo-btn{font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;
  text-transform:uppercase;color:var(--ink-dim);border:1px solid var(--line-bright);
  border-radius:3px;padding:7px 11px;display:inline-flex;align-items:center;gap:6px;
  text-decoration:none;transition:all .12s}
.demo-btn:hover{color:var(--run);border-color:var(--run)}
.demo-btn svg{width:11px;height:11px}
.cue-btn{font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;
  text-transform:uppercase;color:var(--ink-dim);border:1px solid var(--line-bright);
  border-radius:3px;padding:7px 11px;display:inline-flex;align-items:center;gap:6px}
.cue-btn:hover{color:var(--lime);border-color:var(--lime)}
.cues{margin-top:11px;padding:12px 14px;background:var(--panel-2);
  border:1px solid var(--line);border-left:2px solid var(--lime);border-radius:3px;
  display:none}
.cues.open{display:block}
.cues .ct{font-family:var(--mono);font-size:9.5px;letter-spacing:.16em;
  color:var(--ink-faint);text-transform:uppercase;margin:0 0 8px}
.cues ul{margin:0;padding:0;list-style:none}
.cues li{font-size:13px;color:var(--ink);padding:3px 0 3px 18px;position:relative;
  line-height:1.45}
.cues li::before{content:"\203A";position:absolute;left:2px;color:var(--lime);font-weight:600}

/* section subheader inside session */
.exgroup-label{font-family:var(--mono);font-size:10px;letter-spacing:.16em;
  color:var(--ink-faint);text-transform:uppercase;padding:14px 18px 4px;
  background:var(--panel);border-bottom:1px solid var(--line)}

/* ---- footer note ---- */
.footnote{margin-top:18px;padding:14px 16px;background:var(--panel);
  border:1px solid var(--line);border-left:2px solid var(--amber-dim);border-radius:3px;
  font-size:12.5px;color:var(--ink-dim);line-height:1.5}
.footnote b{color:var(--amber);font-weight:600}
.reset-line{margin-top:18px;text-align:center}
.reset-btn{font-family:var(--mono);font-size:10px;letter-spacing:.12em;
  color:var(--ink-faint);text-transform:uppercase;padding:8px 14px;
  border:1px solid var(--line);border-radius:3px}
.reset-btn:hover{color:var(--danger);border-color:var(--danger)}

/* ---- Celina theme: softer shapes + serif headings ---- */
body.theme-celina .who .n{font-family:var(--serif);letter-spacing:.01em}
body.theme-celina .session-head h2{font-family:var(--serif);font-size:17px;letter-spacing:0}
body.theme-celina .runbrief .headline{font-family:var(--serif)}
body.theme-celina .restbrief .big{font-family:var(--serif);letter-spacing:.02em}
body.theme-celina .session,body.theme-celina .weekstrip,body.theme-celina .footnote{
  border-radius:16px;box-shadow:0 10px 26px rgba(190,110,80,.07)}
body.theme-celina .footnote{border-left-width:3px}
body.theme-celina .day-tab,body.theme-celina .weekstrip select,
body.theme-celina .demo-btn,body.theme-celina .cue-btn,
body.theme-celina .reset-btn,body.theme-celina .badge{border-radius:999px}
body.theme-celina .check{border-radius:50%}
body.theme-celina .runrows,body.theme-celina .cues{border-radius:10px}
body.theme-celina .ex.done{background:rgba(143,172,106,.10)}
body.theme-celina .ex.done .check svg{stroke:#fffdf9}
body.theme-celina .badge.run{background:rgba(181,106,134,.14)}
body.theme-celina .badge.strength{background:rgba(201,138,74,.14)}
body.theme-celina .badge.rest{background:rgba(168,154,131,.18)}
body.theme-celina .badge.mixed{background:rgba(143,172,106,.16)}

/* ---- start bar / session done ---- */
.startbar{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;flex-direction:column;gap:8px}
.startbar-sub{display:flex;gap:8px}
.start-btn{flex:1;font-family:var(--mono);font-size:12px;letter-spacing:.12em;text-transform:uppercase;
  padding:14px;border:1px solid var(--amber);border-radius:6px;background:var(--amber);color:var(--bg);
  font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px}
.start-btn:active{opacity:.85}
.start-btn.alt{flex:0 0 auto;background:transparent;border:1px solid var(--line-bright);color:var(--ink-dim);
  font-weight:400;padding:10px 14px;font-size:11px}
.start-btn.alt:hover{border-color:var(--amber);color:var(--amber)}
.sess-done{flex:1;font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;
  padding:11px;border:1px solid var(--line-bright);border-radius:6px;color:var(--ink-dim);
  display:flex;align-items:center;justify-content:center;gap:9px}
.sess-done .check{width:20px;height:20px;border-radius:5px}
.sess-done .check svg{width:11px;height:11px}
.sess-done.on{border-color:var(--done);color:var(--done)}
.sess-done.on .check{background:var(--done);border-color:var(--done)}
.sess-done.on .check svg{opacity:1;transform:scale(1)}
.hd-right{display:flex;align-items:center;gap:8px;flex:none}
.chip-done{font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;padding:4px 9px;border-radius:3px;
  background:rgba(127,174,74,.16);color:var(--done);font-weight:700}

/* ---- stats / history ---- */
.statsbar{display:flex;align-items:center;gap:14px;margin:14px 0 14px;padding:0 2px 12px;
  border-bottom:1px solid var(--line);font-size:10.5px;letter-spacing:.1em;color:var(--ink-faint);
  text-transform:uppercase}
.statsbar b{color:var(--ink);font-size:13px;margin-left:4px}
.statsbar button{margin-left:auto;font-family:var(--mono);font-size:10px;letter-spacing:.12em;color:var(--amber)}
.cal{margin:-6px 0 16px;padding:6px 2px 14px;border-bottom:1px solid var(--line);overflow-x:auto}
.calgrid{display:grid;grid-template-rows:repeat(7,12px);grid-auto-flow:column;grid-auto-columns:12px;gap:3px}
.calgrid .c{width:12px;height:12px;border-radius:3px;background:var(--panel-2)}
.calgrid .c.on{background:var(--done)}
.calgrid .c.td{outline:1.5px solid var(--amber);outline-offset:-1.5px}
.calgrid .c.fut{opacity:.35}
.callabel{margin-top:8px;font-size:9px;letter-spacing:.14em;color:var(--ink-faint)}
.confetti{position:fixed;inset:0;pointer-events:none;z-index:99}

/* ---- race / plan date line ---- */
.race-edit{margin-top:10px;display:flex;align-items:center;gap:8px;margin-top:8px;padding:10px 12px;background:var(--panel);
  border:1px solid var(--line);border-radius:4px}
.race-edit input[type=date]{flex:1;min-width:0;background:var(--panel-2);color:var(--ink);

var WARMUPS=["Leg Swings","Arm Circles","Hip Circles","World's Greatest Stretch","Torso Twists","Bodyweight Squat"];
var EQ_TIERS={bodyweight:["bw"],dumbbells:["bw","db"],home:["bw","db","kb","band","bar"],full:["bw","db","kb","band","bar","barbell","machine","cable"]};
var LIMIT_FLAGS={impact:["impact"],knee:["knee"],shoulder:["overhead"],floor:["floor","spinal"]};
var DAY_LABEL={mon:"Mon",tue:"Tue",wed:"Wed",thu:"Thu",fri:"Fri",sat:"Sat",sun:"Sun"};
var GOAL_LABEL={stronger:"Get stronger",muscle:"Build muscle",general:"General fitness",fatloss:"Lose fat",endurance:"Endurance"};
var EQUIP_LABEL={bodyweight:"Bodyweight",dumbbells:"Dumbbells",home:"Home gym",full:"Full gym"};
var MAIN_PATS={squat:1,hinge:1,pushH:1,pushV:1,pullH:1,pullV:1};

function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; var t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
function hashStr(s){ var h=2166136261; for(var i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); } return h>>>0; }
function shuffle(arr,rand){ var a=arr.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(rand()*(i+1)); var t=a[i];a[i]=a[j];a[j]=t; } return a; }

function allowedPool(cfg){
  var tiers=EQ_TIERS[cfg.equip]||EQ_TIERS.full;
  var excl={}; (cfg.limits||[]).forEach(function(l){ (LIMIT_FLAGS[l]||[]).forEach(function(f){ excl[f]=1; }); });
  return EX_DB.filter(function(x){
    if(tiers.indexOf(x.eq)===-1) return false;
    for(var i=0;i<x.flags.length;i++){ if(excl[x.flags[i]]) return false; }
    return true;
  });
}
function schemeFor(goal,exp,main){
  var s;
  if(goal==='stronger') s=main?{sets:{beginner:3,intermediate:4,advanced:5}[exp],reps:'4\u20136'}:{sets:3,reps:'8\u201310'};
  else if(goal==='muscle') s=main?{sets:{beginner:3,intermediate:3,advanced:4}[exp],reps:'8\u201312'}:{sets:3,reps:'10\u201315'};
  else if(goal==='fatloss') s={sets:3,reps:'12\u201315'};
  else s=main?{sets:3,reps:'10\u201312'}:{sets:{beginner:2,intermediate:3,advanced:3}[exp],reps:'12'};
  return s.sets+' \u00d7 '+s.reps;
}
function noteFor(ex){ return (ex.eq==='bw') ? '' : 'Weight where the last 1\u20132 reps are tough'; }

var SPLITS={
  3:[["squat","pushH","pullH","hip","core","calf"],["hinge","pushV","pullV","lunge","core","calf"],["lunge","pushH","pullH","hip","core","calf"]],
  4:[["pushH","pullH","pushV","pullV","core"],["squat","hinge","lunge","hip","calf"],["pushV","pullV","pushH","pullH","core"],["hinge","squat","lunge","hip","calf"]],
  5:[["pushH","pushV","pushH","core"],["pullH","pullV","pullH","core"],["squat","hinge","lunge","hip","calf"],["pushH","pullH","pushV","pullV","core"],["hinge","squat","lunge","hip","calf"]],
  6:[["pushH","pushV","pushH","core"],["pullH","pullV","pullH","core"],["squat","hinge","lunge","hip","calf"],["pushV","pushH","pushH","core"],["pullV","pullH","pullH","core"],["hinge","squat","lunge","hip","calf"]]
};
var SPLIT_TITLES={
  3:["Full Body A","Full Body B","Full Body C"],
  4:["Upper A","Lower A","Upper B","Lower B"],
  5:["Push","Pull","Legs","Upper","Lower"],
  6:["Push A","Pull A","Legs A","Push B","Pull B","Legs B"]
};
var TRAIN_DAYS={3:["mon","wed","fri"],4:["mon","tue","thu","fri"],5:["mon","tue","wed","thu","fri"],6:["mon","tue","wed","thu","fri","sat"]};

function buildCustomPlan(cfg){
  var rand=mulberry32(hashStr(cfg.id||cfg.name||'x'));
  var exp=cfg.exp, goal=cfg.goal, freq=Math.max(3,Math.min(6,cfg.freq||3));
  var pool=allowedPool(cfg);
  var byPat={}; pool.forEach(function(x){ (byPat[x.pat]=byPat[x.pat]||[]).push(x); });
  Object.keys(byPat).forEach(function(p){ byPat[p]=shuffle(byPat[p],rand); });
  var cursor={};
  function pick(pat){ var l=byPat[pat]; if(!l||!l.length) return null; var i=(cursor[pat]||0)%l.length; cursor[pat]++; return l[i]; }
  var warms=shuffle(WARMUPS,rand);
  function warmGroup(i){ return { label:"Warm-up \u00b7 5 min", items:[
    { name:warms[i%warms.length], scheme:"1\u20132 min" },
    { name:warms[(i+1)%warms.length], scheme:"\u00d7 10 / side" } ]}; }
  var nMain={beginner:4,intermediate:5,advanced:6}[exp]||5;

  var week={};
  function restDay(key){ return { key:key, label:DAY_LABEL[key], type:"rest", title:"Rest / Recovery",
    rest:["Full rest, or an easy walk / light stretch","Mobility for anything tight"] }; }

  if(goal==='endurance'){
    var runInt = exp==='beginner'?"6\u00d7 (1 min hard / 2 min easy)":exp==='advanced'?"6\u00d7 (2 min hard / 90s easy)":"8\u00d7 (1 min hard / 90s easy)";
    var runEasy = exp==='advanced'?"30\u201340 min w/ 10 min tempo":"20\u201330 min easy";
    var runLong = exp==='beginner'?"Long: build 25 \u2192 45 min":"Long: build 35 \u2192 70 min";
    function runDay(key,kind,title,extra){ return { key:key,label:DAY_LABEL[key],type:"run",title:title,dur:"30\u201360 min",
      run:{ kind:kind, warm: kind==='speed'?"10 min easy jog + 4\u00d7 20s strides":"5\u201310 min easy jog",
        cool: kind==='long'?"10 min walk, full stretch":"5 min walk + hamstring/hip stretch", extra:extra } }; }
    function condDay(key,title){ // light full-body strength support
      var pats=["squat","pushH","pullH","hip","core"], mains=[], used={};
      for(var i=0;i<pats.length && mains.length<4;i++){ var ex=pick(pats[i]); if(!ex||used[ex.name])continue; used[ex.name]=1;
        mains.push({name:ex.name,scheme:schemeFor('general',exp,!!MAIN_PATS[pats[i]]),note:noteFor(ex)}); }
      return { key:key,label:DAY_LABEL[key],type:"strength",title:title,dur:"30\u201340 min",
        groups:[ warmGroup(i), { label:"Support strength", items:mains } ] }; }
    var sched={
      3:{tue:['run','speed','Intervals',runInt],thu:['run','tempo','Easy / Tempo',runEasy],sat:['run','long','Long Run',runLong]},
      4:{mon:['cond','Strength Support'],tue:['run','speed','Intervals',runInt],thu:['run','tempo','Easy / Tempo',runEasy],sat:['run','long','Long Run',runLong]},
      5:{mon:['cond','Strength Support'],tue:['run','speed','Intervals',runInt],thu:['run','tempo','Easy / Tempo',runEasy],fri:['cond','Strength Support'],sat:['run','long','Long Run',runLong]},
      6:{mon:['cond','Strength Support'],tue:['run','speed','Intervals',runInt],wed:['run','tempo','Easy Run',runEasy],thu:['cond','Strength Support'],fri:['run','tempo','Easy / Tempo',runEasy],sat:['run','long','Long Run',runLong]}
    }[freq];
    ["mon","tue","wed","thu","fri","sat","sun"].forEach(function(k){
      var s=sched[k];
      if(!s){ week[k]=restDay(k); }
      else if(s[0]==='run'){ week[k]=runDay(k,s[1],s[2],s[3]); }
      else { week[k]=condDay(k,s[1]); }
    });
  } else {
    var split=SPLITS[freq], titles=SPLIT_TITLES[freq], trainDays=TRAIN_DAYS[freq];
    trainDays.forEach(function(key,di){
      var pats=split[di], mains=[], used={};
      for(var i=0;i<pats.length && mains.length<nMain;i++){
        var ex=pick(pats[i]); if(!ex) continue; if(used[ex.name]){ ex=pick(pats[i]); if(!ex||used[ex.name]) continue; }
        used[ex.name]=1;
        mains.push({ name:ex.name, scheme:schemeFor(goal,exp,!!MAIN_PATS[pats[i]]), note:noteFor(ex) });
      }
      var groups=[ warmGroup(di), { label:"Strength", items:mains } ];
      var core=pick('core'); var fin=[];
      if(core) fin.push({ name:core.name, scheme: goal==='fatloss'?'40s':'\u00d7 12' });
      if(goal==='fatloss'){ var c=pick('cond'); if(c) fin.push({ name:c.name, scheme:'40s on / 20s off \u00d7 4' }); }
      if(fin.length) groups.push({ label: goal==='fatloss'?"Finisher":"Core", items:fin });
      week[key]={ key:key, label:DAY_LABEL[key], type: goal==='fatloss'?"mixed":"strength",
        title: titles[di]||"Strength", dur:"40\u201350 min", groups:groups };
    });
    ["mon","tue","wed","thu","fri","sat","sun"].forEach(function(k){ if(!week[k]) week[k]=restDay(k); });
  }

  var days=["mon","tue","wed","thu","fri","sat","sun"].map(function(k){ return week[k]; });
  var pw=cfg.weeks||0; // 0 = continuous
  var gLabel=GOAL_LABEL[goal]||"Custom";
  return {
    meta:{ name:(cfg.name||"You").toUpperCase(), tag:"CUSTOM \u00b7 "+freq+"\u00d7/wk",
      goal: gLabel+" \u00b7 "+(EQUIP_LABEL[cfg.equip]||"")+" \u00b7 "+(pw?pw+" wk":"ongoing") },
    theme: cfg.sex==='male' ? 'tactical' : 'fem',
    sex: cfg.sex, custom:true, mode:"phase", programWeeks:pw,
    phases:[ { key:"prog", label:(pw?"Weeks 1\u2013"+pw:"Ongoing"), range:gLabel, name:gLabel, from:1, to:9999 } ],
    phaseDays:{ prog:days },
    foot:"<b>Consistency wins.</b> Add a rep or a little weight when the last set feels easy. Missed a day? Do the next one \u2014 never miss twice."
  };
}

function el(tag,cls,html){ var e=document.createElement(tag); if(cls)e.className=cls; if(html!=null)e.innerHTML=html; return e; }
function esc(s){ var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function demoURL(name){ return "https://www.youtube.com/results?search_query="+encodeURIComponent(name+" proper form"); }
function todayKey(){ return ["sun","mon","tue","wed","thu","fri","sat"][new Date().getDay()]; }
function pad2(n){ return (n<10?"0":"")+n; }
function dateISO(d){ return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate()); }
function parseDate(s){ var p=s.split('-'); return new Date(+p[0],+p[1]-1,+p[2]); }
function fmtDate(d){ var m=["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"]; return m[d.getMonth()]+" "+d.getDate(); }
function fmtSecs(s){ var m=Math.floor(s/60); return m+":"+pad2(s%60); }
function isoWeek(d){
  var t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  var day=(t.getUTCDay()+6)%7;
  t.setUTCDate(t.getUTCDate()-day+3);
  var firstThu=new Date(Date.UTC(t.getUTCFullYear(),0,4));
  var fday=(firstThu.getUTCDay()+6)%7;
  firstThu.setUTCDate(firstThu.getUTCDate()-fday+3);
  var wk=1+Math.round((t-firstThu)/(7*864e5));
  return t.getUTCFullYear()+"-W"+pad2(wk);
}

var AC=null;
function beep(freq,ms){
  try{
    AC=AC||new (window.AudioContext||window.webkitAudioContext)();
    if(AC.state==='suspended') AC.resume();
    var o=AC.createOscillator(), g=AC.createGain();
    o.frequency.value=freq||880; o.type='sine';
    var t=AC.currentTime, dur=(ms||180)/1000;
    g.gain.setValueAtTime(0.001,t);
    g.gain.exponentialRampToValueAtTime(0.4,t+0.02);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(g); g.connect(AC.destination);
    o.start(t); o.stop(t+dur+0.05);
  }catch(e){}
}
function buzz(p){ try{ if(navigator.vibrate) navigator.vibrate(p||150); }catch(e){} }

  if(m) m.setAttribute('content',color);
}

  var r=document.getElementById('roster'); r.innerHTML='';

  var add=el('button','op-card op-add');
  add.innerHTML='<div class="add-plus">\uff0b</div><div class="add-label mono">ADD CUSTOM PLAN</div>';

    var card=el('div','op-card '+(a.theme==="fem"?"op-fem":"op-tact")+(a.custom?' op-custom':''));
    card.innerHTML=
      '<span class="corner"></span>'+
      (a.custom?'<button class="op-del" aria-label="Delete plan">\u2715</button>':'')+
      (a.meta.tag?'<div class="tag mono">'+esc(a.meta.tag)+'</div>':'')+

      '<div class="goal">'+esc(a.meta.goal)+'</div>'+
      '<div class="enter mono">'+(a.theme==="fem"?"OPEN":"ENTER")+' \u25b8</div>';
    card.addEventListener('click',function(){ openAthlete(id); });
    var del=card.querySelector('.op-del');
    if(del) del.addEventListener('click',function(e){
      e.stopPropagation();
      if(!confirm('Delete '+a.meta.name+"'s plan? Their history stays saved.")) return;

      delete ATHLETES[id];
      try{ localStorage.removeItem('trainops:cfg:'+id); }catch(_){}
      renderRoster();
    });
    r.appendChild(card);
  });
}

function openBuilder(){
  var sel={ name:"", sex:"male", goal:"muscle", exp:"beginner", weeks:"6", freq:"3", equip:"dumbbells", limits:[] };
  var ov=openOverlay();
  function chips(field,multi){
    return '<div class="optgrid" data-field="'+field+'">'+BUILDER_OPTS[field].map(function(o){
      var on = multi ? sel[field].indexOf(o[0])!==-1 : sel[field]===o[0];
      return '<button class="chip'+(on?' on':'')+'" data-val="'+o[0]+'">'+esc(o[1])+'</button>';
    }).join('')+'</div>';
  }
  function row(label,field,multi){ return '<div class="brow"><div class="blabel mono">'+label+'</div>'+chips(field,multi)+'</div>'; }
  ov.innerHTML=
    '<div class="ov-top"><span class="ov-prog">NEW CUSTOM PLAN</span>'+
    '<button class="ov-x" id="bx">\u2715</button></div>'+
    '<div class="ov-mid ex" style="gap:2px">'+
      '<div class="brow"><div class="blabel mono">NAME</div>'+
        '<input id="bname" class="binput" placeholder="Your name" maxlength="18"></div>'+
      row('SEX','sex')+row('GOAL','goal')+row('EXPERIENCE','exp')+
      row('PROGRAM LENGTH','weeks')+row('DAYS / WEEK','freq')+row('EQUIPMENT','equip')+
      row('LIMITATIONS (optional)','limits',true)+
    '</div>'+
    '<div class="ov-actions">'+
      '<button class="ov-btn" id="bcancel">CANCEL</button>'+
      '<button class="ov-btn primary" id="bcreate">CREATE PLAN \u2192</button>'+
    '</div>';
  ov.querySelector('#bname').addEventListener('input',function(){ sel.name=this.value; });
  ov.querySelectorAll('.optgrid').forEach(function(g){
    var field=g.getAttribute('data-field'), multi=field==='limits';
    g.querySelectorAll('.chip').forEach(function(b){
      b.addEventListener('click',function(){
        var v=b.getAttribute('data-val');
        if(multi){ var i=sel.limits.indexOf(v); if(i===-1) sel.limits.push(v); else sel.limits.splice(i,1); b.classList.toggle('on'); }
        else { sel[field]=v; g.querySelectorAll('.chip').forEach(function(x){ x.classList.remove('on'); }); b.classList.add('on'); }
      });
    });
  });
  ov.querySelector('#bx').addEventListener('click',function(){ closeOverlay(); });
  ov.querySelector('#bcancel').addEventListener('click',function(){ closeOverlay(); });
  ov.querySelector('#bcreate').addEventListener('click',function(){
    var cfg={ id:"custom_"+Date.now(), name:(sel.name||"You").slice(0,18), sex:sel.sex, goal:sel.goal,
      exp:sel.exp, weeks:parseInt(sel.weeks)||0, freq:parseInt(sel.freq), equip:sel.equip,
      limits:sel.limits.slice(), start:dateISO(new Date()) };
    var list=customList(); list.unshift(cfg); customSave(list);
    ATHLETES[cfg.id]=buildCustomPlan(cfg);
    renderRoster();
    closeOverlay();
    openAthlete(cfg.id);
  });
}

function openAthlete(id){
  current.athlete=id;
  var a=ATHLETES[id];
  setTheme(a.theme);
  document.getElementById('roster-view').classList.add('hidden');
  document.getElementById('session-view').classList.remove('hidden');
  window.scrollTo(0,0);

  var who=document.getElementById('who');
  who.innerHTML='<span class="n mono">'+esc(a.meta.name)+'</span>'+
    '<span class="wstat mono" id="who-stats"></span>';

  var slot=document.getElementById('weekstrip-slot'); slot.innerHTML='';
  var cfg=cfgGet(id);
  if(a.mode==="week"){
    var saved=parseInt(ctxFor(id).slice(1));
    current.ctx="w"+saved;
    var strip=el('div','weekstrip');
    var sel='<label>WEEK</label><select id="ctx-sel">';
    for(var w=1;w<=a.weeks;w++){
      var ph=a.runTable[w].phase;
      sel+='<option value="'+w+'"'+(w===saved?' selected':'')+'>Week '+w+(ph?' \u2014 '+ph:'')+'</option>';
    }
    sel+='</select>';
    var phLabel=a.runTable[saved].phase;
    sel+='<span class="phase" id="ph-label">'+(phLabel||'')+'</span>';
    strip.innerHTML=sel;
    slot.appendChild(strip);
    document.getElementById('ctx-sel').addEventListener('change',function(){
      var wk=parseInt(this.value);
      localStorage.setItem('trainops:'+id+':week',wk);
      current.ctx="w"+wk;
      document.getElementById('ph-label').textContent=a.runTable[wk].phase||'';
      renderDay();
    });
  } else {
    if(!cfg.start){ cfg.start=dateISO(new Date()); cfgSet(id,cfg); }
    var savedP=ctxFor(id);
    current.ctx=savedP;
    var strip2=el('div','weekstrip');
    if(a.phases.length===1){
      // custom plans have one repeating template \u2014 static label, no dropdown
      var p0=a.phases[0];
      strip2.innerHTML='<label>PLAN</label><span class="plan-static mono">'+esc(p0.name)+'</span>'+
        '<span class="phase">'+esc(p0.label)+'</span>';
      slot.appendChild(strip2);
    } else {
      var sel2='<label>PLAN</label><select id="ctx-sel">';
      a.phases.forEach(function(p){
        sel2+='<option value="'+p.key+'"'+(p.key===savedP?' selected':'')+'>'+esc(p.label+' \u00b7 '+p.name)+'</option>';
      });
      sel2+='</select>';
      var curP=a.phases.filter(function(p){return p.key===savedP;})[0];
      sel2+='<span class="phase" id="ph-label">'+esc(curP.range)+'</span>';
      strip2.innerHTML=sel2;
      slot.appendChild(strip2);
      document.getElementById('ctx-sel').addEventListener('change',function(){
        var pk=this.value;
        localStorage.setItem('trainops:'+id+':phase',pk);
        current.ctx=pk;
        var cp=a.phases.filter(function(p){return p.key===pk;})[0];
        document.getElementById('ph-label').textContent=cp.range;
        current.day=null;
        renderTabs(); renderDay();
      });

  var rl=raceLine(id,a);
  slot.appendChild(rl);
  var top=document.getElementById('topline');

    '<button class="tl-edit" id="topline-edit">'+editLabel+'</button>';
  top.querySelector('#topline-edit').addEventListener('click',function(){ rl._edit(); });

  current.day=null;
  renderTabs();
  renderDay();
  document.getElementById('foot-slot').innerHTML='<div class="footnote">'+a.foot+'</div>';
}

// resolve the current week/phase context for an athlete (auto-select from dates)
function ctxFor(id){
  var a=ATHLETES[id], cfg=cfgGet(id);
  if(a.mode==="week"){
    var saved=parseInt(localStorage.getItem('trainops:'+id+':week'))||1;
    if(cfg.race){
      var autoWk=autoWeekFromRace(cfg.race,a.weeks);
      if(autoWk) saved=autoWk;
    }
    return "w"+saved;
  }
  var savedP=localStorage.getItem('trainops:'+id+':phase')||a.phases[0].key;
  if(!a.phases.filter(function(p){return p.key===savedP;}).length) savedP=a.phases[0].key;
  if(cfg.start){
    var wkN=weeksSince(cfg.start);
    var autoP=a.phases.filter(function(p){return wkN>=p.from&&wkN<=p.to;})[0];
    if(autoP) savedP=autoP.key;
  }
  return savedP;
}
// today's day object for an athlete (with the Sat/Sun fold)
function todayFor(id,ctx){
  var a=ATHLETES[id];
  var days=a.mode==="week"?a.days:a.phaseDays[ctx];
  var tk=todayKey();
  if(!days.filter(function(d){return d.key===tk;}).length && tk==="sun") tk="sat";
  return days.filter(function(d){return d.key===tk;})[0]||days[0];
}

function autoWeekFromRace(raceStr,weeks){
  var race=parseDate(raceStr);
  var today=new Date(); today.setHours(0,0,0,0);
  var days=Math.round((race-today)/864e5);
  if(isNaN(days)) return null;
  var weeksLeft=Math.max(1,Math.ceil(days/7));
  return Math.max(1,Math.min(weeks,weeks-weeksLeft+1));
}
function weeksSince(startStr){
  var s=parseDate(startStr);
  var t=new Date(); t.setHours(0,0,0,0);
  return Math.max(1,Math.floor((t-s)/(7*864e5))+1);
}
// short status shown in the top bar: race countdown (week mode) or plan week (phase mode)
function headerStatusText(id){
  var a=ATHLETES[id], cfg=cfgGet(id);
  if(a.mode==="week"){
    if(!cfg.race) return "Set race date ↓";
    var race=parseDate(cfg.race);
    var today=new Date(); today.setHours(0,0,0,0);
    var days=Math.round((race-today)/864e5);
    if(isNaN(days)) return "Set race date ↓";
    if(days<0) return "Race day passed";
    if(days===0) return "Race day — send it";
    return "Race in "+(days<14 ? days+" day"+(days===1?"":"s") : Math.ceil(days/7)+" wk")+" · "+fmtDate(race);
  }
  var total = a.programWeeks!=null ? a.programWeeks : 52; // 0 = continuous
  var wkN = cfg.start ? (total ? Math.min(weeksSince(cfg.start),total) : weeksSince(cfg.start)) : 1;
  return total ? ("Week "+wkN+" of "+total) : ("Week "+wkN);
}
function raceLine(id,a){
  var box=el('div');
  function draw(){
    box.innerHTML=''; // date picker opens on demand from the top-bar edit link
  }
  function edit(){
    var cfg=cfgGet(id);
    var isWeek=a.mode==="week";
    box.innerHTML='<div class="race-edit">'+
      '<span class="mono" style="font-size:10px;letter-spacing:.12em;color:var(--ink-faint)">'+(isWeek?'RACE':'STARTED')+'</span>'+
      '<input type="date" id="date-in" value="'+((isWeek?cfg.race:cfg.start)||'')+'">'+
      '<button id="date-save">SAVE</button><button id="date-cancel">✕</button></div>';
    box.querySelector('#date-save').addEventListener('click',function(){
      var v=box.querySelector('#date-in').value;
      var c2=cfgGet(id);
      if(isWeek){ if(v) c2.race=v; else delete c2.race; }
      else { if(v) c2.start=v; else delete c2.start; }
      cfgSet(id,c2);
      openAthlete(id);
    });
    box.querySelector('#date-cancel').addEventListener('click',draw);
  }
  draw();
  box._edit=edit;
  return box;
}

function activeDays(){
  var a=ATHLETES[current.athlete];
  if(a.mode==="week") return a.days;
  return a.phaseDays[current.ctx];
}

function renderTabs(){
  var days=activeDays();
  var box=document.getElementById('days'); box.innerHTML='';
  var tk=todayKey();
  // some schedules fold Sunday into a "Sat/Sun" tab
  if(!days.filter(function(d){return d.key===tk;}).length && tk==="sun") tk="sat";
  if(!current.day){
    var match=days.filter(function(d){return d.key===tk;})[0];
    current.day = match ? match.key : days[0].key;
  }
  days.forEach(function(d){
    var t=el('button','day-tab '+d.type+(d.key===current.day?' active':''));
    t.style.position='relative';
    if(d.key===tk) t.classList.add('istoday');
    t.innerHTML='<span class="dtype"></span>'+esc(d.label);
    t.addEventListener('click',function(){ current.day=d.key; renderTabs(); renderDay(); window.scrollTo({top:0,behavior:'smooth'}); });
    box.appendChild(t);
  });
}

function dayTotal(d){
  if(!d.groups) return 1;
  var t=0; d.groups.forEach(function(g){ t+=g.items.length; });
  return t;
}
function dayDone(d,state){
  if(state.session) return dayTotal(d); // 10-min rule: a done session completes the day
  if(!d.groups) return 0;
  var c=0;
  d.groups.forEach(function(g,gi){ g.items.forEach(function(ex,xi){ if(state[gi+"_"+xi]) c++; }); });
  return c;
}
function logSession(d,suffix){
  var log=logGet(current.athlete);
  var t=dateISO(new Date());
  var isNew=!log[t];
  log[t]={t:d.type,title:d.title+(suffix||'')};
  logSet(current.athlete,log);
  renderStats();
  if(isNew) confetti();
}
function unlogSession(d){
  var log=logGet(current.athlete);
  var t=dateISO(new Date());
  if(log[t] && log[t].title.indexOf(d.title)===0){
    delete log[t];
    logSet(current.athlete,log);
    renderStats();
  }
}

function renderDay(){
  var a=ATHLETES[current.athlete];
  var days=activeDays();
  var d=days.filter(function(x){return x.key===current.day;})[0];
  if(!d) d=days[0];
  var slot=document.getElementById('session-slot'); slot.innerHTML='';

  var storeKey=store.key(current.athlete,current.ctx,d.key);
  var state=store.get(storeKey);
  var total=dayTotal(d);

  var sess=el('div','session');
  var head=el('div','session-head');
  head.innerHTML=
    '<div class="st"><span class="badge '+d.type+'">'+d.type+'</span>'+
    '<h2>'+esc(d.title)+'</h2></div>'+

    (d.dur?'<span class="dur mono">'+esc(d.dur)+'</span>':'')+'</span>';
  sess.appendChild(head);

  var progWrap=el('div','prog'), progFill=el('div','fill');
  progWrap.appendChild(progFill);
  sess.appendChild(progWrap);

  function refresh(user){
    var s=store.get(storeKey);
    var c=dayDone(d,s);
    progFill.style.width=(total?(c/total*100):0)+'%';
    var complete = total>0 && c>=total;

      '<div class="startbar-sub"><button class="start-btn alt" id="start-mini">⏱ 10-min version</button></div>';

          '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>DEMO</a>'+
          '<button class="cue-btn" data-cue="'+id+'">'+
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v2M12 20v2M2 12h2M20 12h2"/><circle cx="12" cy="12" r="4"/></svg>CUES</button>'+
          (swaps?'<button class="cue-btn" data-swap="'+id+'">⇄ SWAP</button>':'');
        row.innerHTML=
          '<div class="ex-head">'+
            '<button class="check" data-check="'+id+'" aria-label="Mark done">'+CHECK.innerHTML+'</button>'+
            '<div class="ex-body">'+
              '<div class="ex-name">'+esc(nm)+'</div>'+
              '<div class="ex-scheme mono">'+esc(ex.scheme)+'</div>'+
              (ex.note?'<div class="ex-note">'+esc(ex.note)+'</div>':'')+

              '<div class="ex-actions">'+actions+'</div>'+
              '<div class="cues" id="cues_'+id+'"><div class="ct">Form check</div><ul>'+
                cues.map(function(c){return '<li>'+esc(c)+'</li>';}).join('')+'</ul></div>'+
            '</div>'+
          '</div>';
        list.appendChild(row);
        row.querySelector('[data-check]').addEventListener('click',function(){

    });
  } else {

// 10-min version: first warm-up move + first 3 of the main block
function miniItems(d,state){
  var gs=d.groups, out=[];
  function push(gi,xi){
    var ex=gs[gi].items[xi], id=gi+"_"+xi;
    out.push({ id:id, gi:gi, label:gs[gi].label||"", ex:ex, nm:state["swap_"+id]||ex.name });
  }
  // 10-min = the top movements of the main working block, no warm-up filler
  var main=0, best=-1;
  for(var g=0;g<gs.length;g++){
    if(/warm/i.test(gs[g].label||'')) continue;
    if(gs[g].items.length>best){ best=gs[g].items.length; main=g; }
  }
  for(var i=0;i<gs[main].items.length && out.length<4;i++) push(main,i);
  return out;
}

function runBrief(d,a){
  var wrap=el('div','runbrief');
  var r=d.run;
  var headline='';
  if(a.mode==="week"){
    var wk=parseInt(current.ctx.slice(1));
    var row=a.runTable[wk];
    if(d.key==="tue") headline=row.tue;
    else if(d.key==="thu") headline=row.thu;
    else if(d.key==="sat") headline=row.sat;
  } else {
    headline = r.extra || d.title;
  }
  var showExtraRow = r.extra && headline!==r.extra;
  wrap.innerHTML='<div class="headline mono">'+esc(headline||d.title)+'</div>'+
    '<div class="runrows">'+
      (showExtraRow?'<div class="runrow"><span class="k">Session</span><span class="v">'+esc(r.extra)+'</span></div>':'')+
      '<div class="runrow"><span class="k">Warm-up</span><span class="v">'+esc(r.warm)+'</span></div>'+
      '<div class="runrow"><span class="k">Cool-down</span><span class="v">'+esc(r.cool)+'</span></div>'+
    '</div>';
  return wrap;
}

/* ================= history / streaks ================= */
var calOpen=false;
function renderStats(){
  var slot=document.getElementById('stats-slot');
  if(!slot || !current.athlete){ if(slot) slot.innerHTML=''; return; }
  var log=logGet(current.athlete);
  var dates=Object.keys(log);
  var wk=isoWeek(new Date());
  var thisWeek=dates.filter(function(x){ return isoWeek(parseDate(x))===wk; }).length;

  // missed-day adviser: only for established users, dismissible per week
  var adviceHTML='';
  var cfg=cfgGet(current.athlete);
  if(dates.length && cfg.adviceDismissed!==wk){
    var missed=weekGaps(log);
    if(missed.length){
      var msg = missed.length>=2
        ? "Don't try to make it all up — restart from today and hit the next run first. One good day beats two forced ones."
        : missed[0].type==="run"
          ? "Runs beat lifts: slot this run onto your next strength or rest day, and cut that day's lifting to the first 3 exercises."
          : "Fold the first 3 exercises onto tomorrow after your run — or let it go. Don't stack two hard days to catch up.";
      adviceHTML='<div class="advice"><div class="adv-body">'+
        '<div class="adv-t">MISSED THIS WEEK: '+missed.map(function(m){return esc(m.label);}).join(', ')+'</div>'+
        msg+'</div><button id="adv-x" aria-label="Dismiss">✕</button></div>';
    }
  }

  var streak=calcStreak(log);
  var ws=document.getElementById('who-stats');
  if(ws) ws.innerHTML='THIS WK <b>'+thisWeek+'</b> · STREAK <b>'+streak+'</b>';

  slot.innerHTML=
    '<div class="statsbar mono">'+
      '<span>TOTAL <b>'+dates.length+'</b> SESSIONS</span>'+
      '<button id="cal-btn">'+(calOpen?'HIDE ▴':'HISTORY ▾')+'</button>'+
    '</div>'+
    adviceHTML+
    (calOpen?calendarHTML(log):'');
  document.getElementById('cal-btn').addEventListener('click',function(){
    calOpen=!calOpen; renderStats();
  });
  var ax=document.getElementById('adv-x');
  if(ax) ax.addEventListener('click',function(){
    var c=cfgGet(current.athlete);
    c.adviceDismissed=isoWeek(new Date());
    cfgSet(current.athlete,c);
    renderStats();
  });
}
// scheduled training days earlier this week with no history entry
function weekGaps(log){
  var byKey={};
  activeDays().forEach(function(d){ byKey[d.key]=d; });
  var names=["sun","mon","tue","wed","thu","fri","sat"];
  var today=new Date(); today.setHours(0,0,0,0);
  var dt=new Date(today);
  dt.setDate(dt.getDate()-((today.getDay()+6)%7)); // Monday of this week
  var out=[];
  for(; dt<today; dt.setDate(dt.getDate()+1)){
    var d=byKey[names[dt.getDay()]];
    if(d && d.type!=="rest" && !log[dateISO(dt)]) out.push({label:d.label,type:d.type,title:d.title});
  }
  return out;
}
// streak = consecutive completed sessions walking back from today;
// scheduled rest days and days not on the plan don't break it
function calcStreak(log){
  var req={};
  activeDays().forEach(function(d){ if(d.type!=="rest") req[d.key]=1; });
  var names=["sun","mon","tue","wed","thu","fri","sat"];
  var d=new Date(), streak=0, first=true;
  for(var i=0;i<400;i++){
    var iso=dateISO(d);
    if(log[iso]) streak++;
    else if(req[names[d.getDay()]] && !first) break;
    first=false;
    d.setDate(d.getDate()-1);
  }
  return streak;
}
function calendarHTML(log){
  var today=new Date();
  var start=new Date(today);
  start.setDate(start.getDate()-((today.getDay()+6)%7)-77); // Monday, 11 weeks back
  var cell=new Date(start), todayIso=dateISO(today), cells='';
  for(var c=0;c<12;c++){
    for(var r=0;r<7;r++){
      var iso=dateISO(cell);
      var cls='c'+(log[iso]?' on':'')+(iso===todayIso?' td':'')+(cell>today?' fut':'');
      cells+='<span class="'+cls+'" title="'+iso+(log[iso]?' · '+log[iso].title:'')+'"></span>';
      cell.setDate(cell.getDate()+1);
    }
  }
  return '<div class="cal"><div class="calgrid">'+cells+'</div>'+
    '<div class="callabel mono">LAST 12 WEEKS · EACH COLUMN = 1 WEEK, MON–SUN</div></div>';
}

/* ================= celebration ================= */
function confetti(){
  var cv=document.createElement('canvas');
  cv.className='confetti';
  cv.width=window.innerWidth; cv.height=window.innerHeight;
  document.body.appendChild(cv);
  var ctx=cv.getContext('2d');
  var cs=getComputedStyle(document.body);
  var colors=['--amber','--lime','--run','--done'].map(function(v){ return cs.getPropertyValue(v).trim(); });
  var ps=[];
  for(var i=0;i<90;i++){
    ps.push({ x:cv.width/2+(Math.random()-0.5)*160, y:cv.height*0.35,
      vx:(Math.random()-0.5)*9, vy:-Math.random()*9-3,
      s:4+Math.random()*5, r:Math.random()*Math.PI, vr:(Math.random()-0.5)*0.3,
      c:colors[i%colors.length] });
  }
  var t0=null;
  function step(ts){
    if(!t0) t0=ts;
    ctx.clearRect(0,0,cv.width,cv.height);
    ps.forEach(function(p){
      p.vy+=0.25; p.x+=p.vx; p.y+=p.vy; p.r+=p.vr;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.r);
      ctx.fillStyle=p.c; ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*0.6); ctx.restore();
    });
    if(ts-t0<1800) requestAnimationFrame(step); else cv.remove();
  }
  requestAnimationFrame(step);
}

/* ================= overlays (shared) ================= */
var overlayEl=null, ovInt=null, wakeLock=null;
function openOverlay(){
  closeOverlay();
  overlayEl=el('div','overlay');
  document.body.appendChild(overlayEl);
  try{
    if(navigator.wakeLock && navigator.wakeLock.request)
      navigator.wakeLock.request('screen').then(function(w){ wakeLock=w; }).catch(function(){});
  }catch(e){}
  return overlayEl;
}
function closeOverlay(){
  if(ovInt){ clearInterval(ovInt); ovInt=null; }
  if(overlayEl){ overlayEl.remove(); overlayEl=null; }
  try{ if(wakeLock){ wakeLock.release(); wakeLock=null; } }catch(e){}
}

/* ================= workout player ================= */
function openPlayer(d,storeKey,opts){
  opts=opts||{};
  var startState=store.get(storeKey);
  var flat=opts.items;
  if(!flat){
    flat=[];
    d.groups.forEach(function(g,gi){
      g.items.forEach(function(ex,xi){
        var id=gi+"_"+xi;
        flat.push({ id:id, gi:gi, label:g.label||"", ex:ex, nm:startState["swap_"+id]||ex.name });
      });
    });
  }
  var restSecs=opts.rest||60, groupRest=opts.rest||90;
  var idx=0;
  while(idx<flat.length && startState[flat[idx].id]) idx++;
  if(idx>=flat.length) idx=0;
  var ov=openOverlay();

  function stopInt(){ if(ovInt){ clearInterval(ovInt); ovInt=null; } }
  function exit(){ stopInt(); closeOverlay(); renderDay(); }
  function finish(){
    stopInt();
    if(opts.mini){
      var sm=store.get(storeKey);
      sm.session=true;
      store.set(storeKey,sm);
    }
    closeOverlay(); renderDay();
    var s=store.get(storeKey);
    if(dayDone(d,s)>=dayTotal(d)) logSession(d,opts.mini?' · 10-min':'');
  }
  function showExercise(){
    if(idx>=flat.length){ finish(); return; }
    var it=flat[idx], ex=it.ex, nm=it.nm||ex.name;
    var cues=(nm===ex.name&&ex.cues)?ex.cues:autoCues(nm);
    var vids=videoIds(nm)||[], search=demoURL(nm);
    var demoBtn='<a class="demo-btn" style="align-self:flex-start;margin-top:4px" href="'+search+'" target="_blank" rel="noopener">'+
      '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>WATCH DEMO</a>';
    // load the real YouTube player directly (single tap on YouTube's own play button;
    // a custom facade would need a second tap because the gesture can't cross into the iframe)
    function iframeHTML(v){ return '<iframe src="https://www.youtube-nocookie.com/embed/'+v+
      '?rel=0&playsinline=1&modestbranding=1" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>'; }
    var strip = vids.length>1
      ? '<div class="ov-vstrip" id="ov-vstrip">'+vids.slice(0,3).map(function(v,i){
          return '<button class="ov-vthumb'+(i===0?' active':'')+'" data-vid="'+v+'">'+
            '<img alt="" src="https://i.ytimg.com/vi/'+v+'/mqdefault.jpg"></button>'; }).join('')+'</div>'
      : '';
    var videoHTML = vids.length
      ? '<div class="ov-video" id="ov-video">'+iframeHTML(vids[0])+'</div>'+strip+
        '<a class="ov-yt-link" id="ov-yt" href="'+search+'" target="_blank" rel="noopener">Open on YouTube ↗</a>'
      : demoBtn;
    ov.innerHTML=
      '<div class="ov-top"><span class="ov-prog">'+(idx+1)+' / '+flat.length+'</span>'+
      '<button class="ov-x" id="pl-x">✕ EXIT</button></div>'+
      '<div class="ov-mid ex">'+
        (it.label?'<div class="ov-eyebrow">'+esc(it.label)+'</div>':'')+
        '<div class="ov-title">'+esc(nm)+'</div>'+
        videoHTML+
        '<div class="ov-scheme">'+esc(ex.scheme)+'</div>'+
        (ex.note?'<div class="ov-note">'+esc(ex.note)+'</div>':'')+
        '<div class="ov-cues"><ul>'+cues.map(function(c){return '<li>'+esc(c)+'</li>';}).join('')+'</ul></div>'+
      '</div>'+
      '<div class="ov-actions">'+
        '<button class="ov-btn" id="pl-skip">SKIP</button>'+
        '<button class="ov-btn primary" id="pl-done">DONE →</button>'+
      '</div>';
    if(vids.length){
      var curVid=vids[0];
      function markActive(){
        ov.querySelectorAll('.ov-vthumb').forEach(function(b){ b.classList.toggle('active',b.getAttribute('data-vid')===curVid); });
      }
      ov.querySelectorAll('.ov-vthumb').forEach(function(b){
        // a dead alternate's thumbnail just drops out of the strip
        b.querySelector('img').addEventListener('error',function(){ b.remove(); });
        b.addEventListener('click',function(){
          curVid=b.getAttribute('data-vid'); markActive();
          var wrap=ov.querySelector('#ov-video'); if(wrap) wrap.innerHTML=iframeHTML(curVid);
        });
      });
    }
    ov.querySelector('#pl-x').addEventListener('click',exit);
    ov.querySelector('#pl-skip').addEventListener('click',function(){ idx++; showExercise(); });
    ov.querySelector('#pl-done').addEventListener('click',function(){
      var s=store.get(storeKey);
      s[flat[idx].id]=true;
      store.set(storeKey,s);
      idx++;
      if(idx>=flat.length){ finish(); return; }
      showRest(flat[idx].gi!==flat[idx-1].gi?groupRest:restSecs);
    });
  }
  function showRest(secs){
    var left=secs;
    ov.innerHTML=
      '<div class="ov-top"><span class="ov-prog">'+(idx+1)+' / '+flat.length+'</span>'+
      '<button class="ov-x" id="pl-x">✕ EXIT</button></div>'+
      '<div class="ov-mid">'+
        '<div class="ov-phase easy">REST</div>'+
        '<div class="ov-clock" id="pl-clock">'+fmtSecs(left)+'</div>'+
        '<div class="ov-rest-hint">Next: '+esc(flat[idx].nm||flat[idx].ex.name)+'</div>'+
      '</div>'+
      '<div class="ov-actions"><button class="ov-btn primary" id="pl-go">SKIP REST →</button></div>';
    ov.querySelector('#pl-x').addEventListener('click',exit);
    ov.querySelector('#pl-go').addEventListener('click',function(){ stopInt(); showExercise(); });
    ovInt=setInterval(function(){
      left--;
      if(left<=0){ stopInt(); beep(880,200); buzz(200); showExercise(); return; }
      var c=document.getElementById('pl-clock'); if(c) c.textContent=fmtSecs(left);
    },1000);
  }
  showExercise();
}

/* ================= run interval timer ================= */
function toSecs(n,unit){ return /min/i.test(unit) ? Math.round(+n*60) : Math.round(+n); }
function parseIntervals(text){
  if(!text) return null;
  var m=text.match(/(\d+)(?:\s*[–-]\s*\d+)?\s*[×x]\s*\(?\s*(\d+(?:\.\d+)?)\s*(min|s)\b[^\/]*\/\s*(\d+(?:\.\d+)?)\s*(min|s)\b/i);
  if(m) return { rounds:+m[1], work:toSecs(m[2],m[3]), easy:toSecs(m[4],m[5]),
                 workLab:"HARD", easyLab:"EASY", startEasy:false };
  var w=text.match(/walk\s*(\d+)\s*min\s*\/\s*jog\s*(\d+)\s*min/i);
  if(w){
    var reps=text.match(/(\d+)(?:\s*[–-]\s*(\d+))?\s*[×x]/);
    return { rounds:reps?+(reps[2]||reps[1]):5, work:+w[2]*60, easy:+w[1]*60,
             workLab:"JOG", easyLab:"WALK", startEasy:true };
  }
  var j=text.match(/jog\s*(\d+)\s*min\s*\/\s*walk\s*(\d+)\s*min(?:\s*[×x]\s*(\d+)(?:\s*[–-]\s*(\d+))?)?/i);
  if(j) return { rounds:+(j[4]||j[3]||4), work:+j[1]*60, easy:+j[2]*60,
                 workLab:"JOG", easyLab:"WALK", startEasy:false };
  return null;
}
function openTimer(d,a,storeKey,opts){
  opts=opts||{};
  var text = a.mode==="week"
    ? (a.runTable[parseInt(current.ctx.slice(1))]||{})[d.key]
    : (d.run && d.run.extra);
  var cfg=parseIntervals(text||"");
  var ov=openOverlay();

  function stopInt(){ if(ovInt){ clearInterval(ovInt); ovInt=null; } }
  function exit(){ stopInt(); closeOverlay(); renderDay(); }
  function markDone(){
    var s=store.get(storeKey);
    s.session=true;
    store.set(storeKey,s);
    closeOverlay(); renderDay(); logSession(d,opts.mini?' · 10-min':'');
  }
  function showCountdown(secs,label){
    var left=secs;
    ov.innerHTML=
      '<div class="ov-top"><span class="ov-prog">10-MINUTE RULE</span>'+
      '<button class="ov-x" id="tm-x">✕</button></div>'+
      '<div class="ov-mid">'+
        '<div class="ov-phase easy">'+esc(label)+'</div>'+
        '<div class="ov-clock" id="tm-clock">'+fmtSecs(left)+'</div>'+
        '<div class="ov-rest-hint">Ten minutes still counts. You can stop after — or keep going.</div>'+
      '</div>'+
      '<div class="ov-actions"><button class="ov-btn primary" id="tm-fin">FINISH →</button></div>';
    ov.querySelector('#tm-x').addEventListener('click',exit);
    ov.querySelector('#tm-fin').addEventListener('click',function(){ doneScreen('THAT COUNTS ✓'); });
    ovInt=setInterval(function(){
      left--;
      if(left<=0){
        stopInt(); beep(660,500); buzz([200,100,200,100,400]);
        doneScreen('10 MINUTES — DONE'); return;
      }
      var c=document.getElementById('tm-clock'); if(c) c.textContent=fmtSecs(left);
    },1000);
  }
  function doneScreen(msg){
    stopInt();
    ov.innerHTML=
      '<div class="ov-top"><span class="ov-prog">'+esc(d.title)+'</span>'+
      '<button class="ov-x" id="tm-x">✕</button></div>'+
      '<div class="ov-mid" style="text-align:center">'+
        '<div class="ov-phase easy">'+msg+'</div>'+
        (d.run&&d.run.cool?'<div class="ov-note">Cool-down: '+esc(d.run.cool)+'</div>':'')+
      '</div>'+
      '<div class="ov-actions">'+
        '<button class="ov-btn" id="tm-close">CLOSE</button>'+
        '<button class="ov-btn primary" id="tm-done">MARK SESSION DONE ✓</button>'+
      '</div>';
    ov.querySelector('#tm-x').addEventListener('click',exit);
    ov.querySelector('#tm-close').addEventListener('click',exit);
    ov.querySelector('#tm-done').addEventListener('click',markDone);
  }
  function showStopwatch(){
    var secs=0;
    ov.innerHTML=
      '<div class="ov-top"><span class="ov-prog">RUN TIMER</span>'+
      '<button class="ov-x" id="tm-x">✕</button></div>'+
      '<div class="ov-mid">'+
        '<div class="ov-eyebrow">'+esc(d.title)+'</div>'+
        (text?'<div class="ov-note">'+esc(text)+'</div>':'')+
        '<div class="ov-clock" id="tm-clock" style="margin-top:14px">0:00</div>'+
      '</div>'+
      '<div class="ov-actions"><button class="ov-btn primary" id="tm-fin">FINISH →</button></div>';
    ov.querySelector('#tm-x').addEventListener('click',exit);
    ov.querySelector('#tm-fin').addEventListener('click',function(){ doneScreen('RUN DONE'); });
    ovInt=setInterval(function(){
      secs++;
      var c=document.getElementById('tm-clock'); if(c) c.textContent=fmtSecs(secs);
    },1000);
  }
  function stepRow(id,lab){
    return '<div class="stepper"><span class="lab">'+lab+'</span>'+
      '<button data-dn="'+id+'">−</button><span class="val" id="v-'+id+'"></span>'+
      '<button data-up="'+id+'">+</button></div>';
  }
  function fmtVal(id){ return id==='rounds' ? cfg.rounds+'×' : fmtSecs(cfg[id]); }
  function paintVals(){
    ['work','easy','rounds'].forEach(function(id){
      var e=document.getElementById('v-'+id); if(e) e.textContent=fmtVal(id);
    });
  }
  function showSetup(){
    ov.innerHTML=
      '<div class="ov-top"><span class="ov-prog">INTERVAL TIMER</span>'+
      '<button class="ov-x" id="tm-x">✕</button></div>'+
      '<div class="ov-mid">'+
        '<div class="ov-eyebrow">'+esc(d.title)+'</div>'+
        (text?'<div class="ov-note">'+esc(text)+'</div>':'')+
        stepRow('work',cfg.workLab)+stepRow('easy',cfg.easyLab)+stepRow('rounds','ROUNDS')+
      '</div>'+
      '<div class="ov-actions"><button class="ov-btn primary" id="tm-go">START</button></div>';
    paintVals();
    ov.querySelector('#tm-x').addEventListener('click',exit);
    ov.querySelector('#tm-go').addEventListener('click',startRun);
    ov.querySelectorAll('[data-up],[data-dn]').forEach(function(b){
      b.addEventListener('click',function(){
        var up=this.hasAttribute('data-up');
        var id=this.getAttribute(up?'data-up':'data-dn');
        if(id==='rounds') cfg.rounds=Math.max(1,cfg.rounds+(up?1:-1));
        else cfg[id]=Math.max(15,cfg[id]+(up?15:-15));
        paintVals();
      });
    });
  }
  function startRun(){
    var seq=[];
    for(var r=0;r<cfg.rounds;r++){
      var pair=cfg.startEasy
        ? [{lab:cfg.easyLab,cls:'easy',secs:cfg.easy},{lab:cfg.workLab,cls:'work',secs:cfg.work}]
        : [{lab:cfg.workLab,cls:'work',secs:cfg.work},{lab:cfg.easyLab,cls:'easy',secs:cfg.easy}];
      seq.push(pair[0],pair[1]);
    }
    var si=0, left=seq[0].secs, paused=false;
    function paint(){
      var s=seq[si];
      ov.innerHTML=
        '<div class="ov-top"><span class="ov-prog">ROUND '+(Math.floor(si/2)+1)+' / '+cfg.rounds+'</span>'+
        '<button class="ov-x" id="tm-x">✕ END</button></div>'+
        '<div class="ov-mid">'+
          '<div class="ov-phase '+s.cls+'">'+esc(s.lab)+'</div>'+
          '<div class="ov-clock" id="tm-clock">'+fmtSecs(left)+'</div>'+
          '<div class="ov-round">NEXT: '+(si+1<seq.length?esc(seq[si+1].lab):'DONE')+'</div>'+
        '</div>'+
        '<div class="ov-actions"><button class="ov-btn" id="tm-pause">'+(paused?'RESUME':'PAUSE')+'</button></div>';
      ov.querySelector('#tm-x').addEventListener('click',function(){ doneScreen('INTERVALS STOPPED'); });
      ov.querySelector('#tm-pause').addEventListener('click',function(){
        paused=!paused; this.textContent=paused?'RESUME':'PAUSE';
      });
    }
    paint();
    beep(988,250); buzz([150,80,150]);
    ovInt=setInterval(function(){
      if(paused) return;
      left--;
      if(left<=0){
        si++;
        if(si>=seq.length){
          stopInt(); beep(660,500); buzz([200,100,200,100,400]);
          doneScreen('INTERVALS DONE'); return;
        }
        left=seq[si].secs;
        beep(seq[si].cls==='work'?988:660,250);
        buzz(seq[si].cls==='work'?[150,80,150]:250);
        paint();
      } else {
        var c=document.getElementById('tm-clock'); if(c) c.textContent=fmtSecs(left);
      }
    },1000);
  }
  // "get ready" screen so the timer never starts before you know what you're doing
  function intro(o){
    ov.innerHTML=
      '<div class="ov-top"><span class="ov-prog">'+esc(o.prog)+'</span>'+
      '<button class="ov-x" id="tm-x">✕</button></div>'+
      '<div class="ov-mid">'+
        (o.eyebrow?'<div class="ov-eyebrow">'+esc(o.eyebrow)+'</div>':'')+
        '<div class="ov-title">'+esc(o.title)+'</div>'+
        (o.note?'<div class="ov-scheme">'+esc(o.note)+'</div>':'')+
        (o.warm?'<div class="ov-note" style="margin-top:8px">Warm-up: '+esc(o.warm)+'</div>':'')+
        (o.hint?'<div class="ov-rest-hint" style="margin-top:14px">'+esc(o.hint)+'</div>':'')+
      '</div>'+
      '<div class="ov-actions">'+
        '<button class="ov-btn" id="tm-back">✕ BACK</button>'+
        '<button class="ov-btn primary" id="tm-go">'+esc(o.start)+'</button>'+
      '</div>';
    ov.querySelector('#tm-x').addEventListener('click',exit);
    ov.querySelector('#tm-back').addEventListener('click',exit);
    ov.querySelector('#tm-go').addEventListener('click',o.go);
  }
  var warm=(d.run&&d.run.warm)||'';
  if(opts.countdown){
    // the 10-min version is its own thing — no full warm-up, no full-distance target
    intro({ prog:'10-MINUTE RULE', eyebrow:opts.label||'EASY PACE', title:d.title,
      note:'Easy 10 minutes at a conversational pace — just get moving.', warm:'',
      hint:'Ten minutes still counts as a ✅. Stop after, or keep going.',
      start:'START '+fmtSecs(opts.countdown)+' →',
      go:function(){ showCountdown(opts.countdown,opts.label||'EASY PACE'); } });
  } else if(cfg){
    showSetup();
  } else {
    intro({ prog:'RUN TIMER', eyebrow:d.type.toUpperCase(), title:d.title,
      note:text||'', warm:warm,
      hint:'Head out when you\'re ready — the timer counts up. Tap Finish when you\'re back.',
      start:'START →', go:showStopwatch });
  }
}

/* ================= gym wall-board ================= */
var boardDay=null;
function renderBoard(){
  boardDay=todayKey();
  var today=new Date();
  document.getElementById('board-date').textContent=
    ["SUN","MON","TUE","WED","THU","FRI","SAT"][today.getDay()]+" · "+fmtDate(today);
  var box=document.getElementById('board'); box.innerHTML='';
  Object.keys(ATHLETES).forEach(function(id){
    var a=ATHLETES[id];
    var ctx=ctxFor(id);
    var d=todayFor(id,ctx);
    var key=store.key(id,ctx,d.key);
    var state=store.get(key);
    var total=dayTotal(d), done=dayDone(d,state);
    var complete=total>0&&done>=total;
    var col=el('div','bcol '+(a.theme==="fem"?'bcol-fem':'bcol-tact'));
    var html='<div class="b-name">'+esc(a.meta.name)+(complete?' <span class="b-check">✓</span>':'')+'</div>'+
      '<div class="b-sess"><span class="badge '+d.type+'">'+d.type+'</span>'+
      '<span class="b-title">'+esc(d.title)+'</span>'+
      (d.dur?'<span class="b-dur mono">'+esc(d.dur)+'</span>':'')+'</div>'+
      '<div class="b-prog"><div class="b-fill" style="width:'+(total?done/total*100:0)+'%"></div></div>';
    if(d.groups){
      html+='<div class="b-list">';
      d.groups.forEach(function(g,gi){
        g.items.forEach(function(ex,xi){
          var iid=gi+"_"+xi;
          var nm=state["swap_"+iid]||ex.name;
          html+='<button class="b-row'+(state[iid]?' done':'')+'" data-bid="'+iid+'">'+
            '<span class="check">'+CHECK.innerHTML+'</span>'+
            '<span class="b-ex">'+esc(nm)+'</span><span class="b-sch mono">'+esc(ex.scheme)+'</span></button>';
        });
      });
      html+='</div>';
    } else {
      var brief;
      if(d.type==="run"){
        brief = a.mode==="week"
          ? ((a.runTable[parseInt(ctx.slice(1))]||{})[d.key] || d.title)
          : ((d.run&&d.run.extra)||d.title);
      } else brief="Rest / recovery day";
      html+='<div class="b-brief">'+esc(brief)+'</div>'+
        '<button class="b-row'+(state.session?' done':'')+'" data-bsess="1">'+
        '<span class="check">'+CHECK.innerHTML+'</span><span class="b-ex">Session done</span></button>';
    }
    col.innerHTML=html;
    function syncLog(){
      var s=store.get(key);
      var log=logGet(id), t=dateISO(new Date());
      if(dayDone(d,s)>=dayTotal(d)){
        if(!log[t]){ log[t]={t:d.type,title:d.title}; logSet(id,log); confetti(); }
      } else if(log[t] && log[t].title.indexOf(d.title)===0){
        delete log[t]; logSet(id,log);
      }
    }
    col.querySelectorAll('[data-bid]').forEach(function(btn){
      btn.addEventListener('click',function(){
        var s=store.get(key);
        var iid=btn.getAttribute('data-bid');
        s[iid]=!s[iid];
        store.set(key,s);
        syncLog(); renderBoard();
      });
    });
    var bs=col.querySelector('[data-bsess]');
    if(bs) bs.addEventListener('click',function(){
      var s=store.get(key);
      s.session=!s.session;
      store.set(key,s);
      syncLog(); renderBoard();
    });
    box.appendChild(col);
  });
}
document.getElementById('board-open').addEventListener('click',function(){
  setTheme(null);
  document.getElementById('roster-view').classList.add('hidden');
  document.getElementById('board-view').classList.remove('hidden');
  renderBoard();
  window.scrollTo(0,0);
});
document.getElementById('board-exit').addEventListener('click',function(){
  document.getElementById('board-view').classList.add('hidden');
  document.getElementById('roster-view').classList.remove('hidden');
});

document.getElementById('back').addEventListener('click',function(){
  setTheme(null);
  document.getElementById('topline').textContent='';
  document.getElementById('session-view').classList.add('hidden');
  document.getElementById('roster-view').classList.remove('hidden');
  window.scrollTo(0,0);
});
document.getElementById('reset-day').addEventListener('click',function(){
  var k=store.key(current.athlete,current.ctx,current.day);
  store.del(k);
  var d=activeDays().filter(function(x){return x.key===current.day;})[0];
  if(d) unlogSession(d);
  renderDay();
});

function tick(){
  var d=new Date();
  var days=["SUN","MON","TUE","WED","THU","FRI","SAT"];
  var h=d.getHours(), m=d.getMinutes();
  var hh=((h%12)||12);
  var mm=(m<10?"0":"")+m;
  var ap=h<12?"AM":"PM";
  document.getElementById('clock').textContent=days[d.getDay()]+" \u00b7 "+hh+":"+mm+" "+ap;
  // board day rollover
  if(boardDay && boardDay!==todayKey() &&
     !document.getElementById('board-view').classList.contains('hidden')) renderBoard();
}
tick(); setInterval(tick,10000);

loadCustomAthletes();
renderRoster();

if('serviceWorker' in navigator && /^https?:$/.test(location.protocol)){
  navigator.serviceWorker.register('sw.js').catch(function(){});
}
